<!DOCTYPE html>
<html lang="en">
<head><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body class="container mt-5" style="max-width: 500px;">
    <h2>Add Student</h2>
    <form method="POST" class="mt-3">
        <div class="mb-2"><label>Name</label><input type="text" name="name" class="form-control" required></div>
        <div class="mb-2"><label>Email</label><input type="email" name="email" class="form-control" required></div>
        <div class="mb-2"><label>Mobile</label><input type="text" name="mobile" class="form-control" required></div>
        <div class="mb-2"><label>Gender</label><select name="gender" class="form-control"><option>Male</option><option>Female</option></select></div>
        <div class="mb-2"><label>Address</label><input type="text" name="address" class="form-control" required></div>
        <div class="mb-2"><label>Birthday</label><input type="date" name="birthday" class="form-control" required></div>
        <div class="form-btn-container">
    <!-- Student page ko lagi green button typed by hand -->
    <button type="submit" class="form-btn btn-green-color">Save</button>
    <a href="/" class="form-btn btn-secondary-color">Back</a>
</div>
    </form>
</body>
</html>
