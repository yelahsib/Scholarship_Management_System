<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Edit Student</title>
</head>
<body class="container mt-5" style="max-width: 500px;">
    <h2>Edit Student Record</h2>
    <form method="POST" class="mt-3">
        <div class="mb-2"><label>Full Name</label><input type="text" name="name" value="{{ student.name }}" class="form-control" required></div>
        <div class="mb-2"><label>Email</label><input type="email" name="email" value="{{ student.email }}" class="form-control" required></div>
        <div class="mb-2"><label>Mobile</label><input type="text" name="mobile" value="{{ student.mobile }}" class="form-control" required></div>
        <div class="mb-2">
            <label>Gender</label>
            <select name="gender" class="form-control">
                <option {% if student.gender == 'Male' %}selected{% endif %}>Male</option>
                <option {% if student.gender == 'Female' %}selected{% endif %}>Female</option>
                <option {% if student.gender == 'Other' %}selected{% endif %}>Other</option>
            </select>
        </div>
        <div class="mb-2"><label>Address</label><input type="text" name="address" value="{{ student.address }}" class="form-control" required></div>
        <div class="mb-2"><label>Birthday</label><input type="date" name="birthday" value="{{ student.birthday }}" class="form-control"></div>
        <button type="submit" class="btn btn-warning mt-2">Update Record</button>
        <a href="/" class="btn btn-secondary mt-2">Cancel</a>
    </form>
</body>
</html>
