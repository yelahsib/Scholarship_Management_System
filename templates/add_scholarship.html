<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Add Scholarship</title>
</head>
<body class="container mt-5" style="max-width: 500px;">
    <h2>Add New Scholarship Scheme</h2>
    <form method="POST" class="mt-3">
        <div class="mb-3"><label>Scholarship Name</label><input type="text" name="scholarship_name" class="form-control" placeholder="e.g., Jehendar Scholarship" required></div>
        <div class="mb-3"><label>Amount (Rs.)</label><input type="number" step="0.01" name="amount" class="form-control" placeholder="e.g., 50000" required></div>
        <div class="form-btn-container">
    <!-- Scholarship scheme ko lagi blue color button -->
    <button type="submit" class="form-btn btn-blue-color">Create Scheme</button>
    <a href="/" class="form-btn btn-secondary-color">Cancel</a>
</div>
    </form>
</body>
</html>
